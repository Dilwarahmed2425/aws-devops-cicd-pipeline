apiVersion: apps/v1
kind: Deployment

metadata:
  name: springboot-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: springboot-app

  template:

    metadata:
      labels:
        app: springboot-app

    spec:

      containers:

      - name: springboot-app

        image: dilwarahmed/springboot-cicd:1

        ports:

        - containerPort: 8080